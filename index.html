<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleephat Editor</title>
  </head>
  <body>
    <div id="app"></div>
    <div id="welcome-overlay" style="display:none">
      <div class="welcome-box" style="position:relative">
        <button id="btn-welcome-theme" class="welcome-theme-btn" title="切换深色/浅色">🌙</button>
        <h1>Markdown Editor</h1>
        <p class="welcome-hint">打开或新建一个 Markdown 文件开始编辑</p>
        <button id="btn-open-file" class="welcome-btn">打开文件</button>
        <p class="welcome-shortcut">或按 <kbd>Ctrl</kbd> + <kbd>O</kbd></p>
        <button id="btn-new-file" class="welcome-btn" style="margin-top:8px">新建文件</button>
        <p class="welcome-shortcut">或按 <kbd>Ctrl</kbd> + <kbd>N</kbd></p>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
